<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="580" fill="#F5F1EB"/>
  <!-- Abstract curved road / momentum swoosh -->
  <path d="M-50 500 Q 200 420, 400 380 T 850 280" fill="none" stroke="#0B2A4A" stroke-width="80" stroke-linecap="round" opacity="0.9"/>
  <path d="M-50 500 Q 200 420, 400 380 T 850 280" fill="none" stroke="#F26522" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
  <!-- Secondary subtle arc -->
  <path d="M-50 580 Q 250 480, 500 420 T 900 300" fill="none" stroke="#0B2A4A" stroke-width="40" stroke-linecap="round" opacity="0.08"/>
  <!-- Dotted grid accent -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="#0B2A4A" opacity="0.08"/>
  </pattern>
  <rect x="500" y="0" width="300" height="580" fill="url(#dots)"/>
</svg>
